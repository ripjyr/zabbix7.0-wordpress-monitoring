              name: 'WordPress git path exposed'
              url_name: 'Check .git/ path'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}.git/'
              priority: HIGH
              description: |
                Purpose
                Detects exposure of a Git repository directory (.git/) within the web root.
                
                Remediation
                Remove the repository from the web root or restrict access via web server configuration.
                
                False Positive
                Rare. Git repositories should never be publicly accessible.
                
                Reference
                https://owasp.org/www-project-top-ten/
              manual_close: 'YES'
        - uuid: f6cbe4ea7bc54b6f94caad294efc8d96
          name: 'WordPress PHP Information info.php Exposure'
          type: HTTP_AGENT
          key: wordpress.infophp.status
          delay: 1d
          description: |
            Purpose
            Detects exposure of a PHP information page such as phpinfo.php or info.php.
            
            These pages display detailed information about the PHP environment,
            including PHP version, loaded modules, filesystem paths,
            and server configuration.
            
            This information can assist attackers in identifying vulnerabilities
            or planning targeted attacks.
            
            Remediation
            Remove the phpinfo script from the web root after debugging
            or restrict access to trusted IP addresses.
            
            False Positive
            Rare. phpinfo pages are typically only used during development
            or troubleshooting.
            
            Reference
            https://www.php.net/manual/en/function.phpinfo.php
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}info.php'
          status_codes: ''
          retrieve_mode: HEADERS
          triggers:
            - uuid: b1dc953376514c5dafa4057ceb626d1b
              expression: last(/Template_WordPress_Security_HTTP/wordpress.infophp.status)=200
              name: 'WordPress phpinfo page exposed (info.php)'
              url_name: 'View info.php'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}info.php'
              priority: INFO
              description: |
                Purpose
                Detects exposure of a PHP information page such as phpinfo.php or info.php.
                
                These pages display detailed information about the PHP environment,
                including PHP version, loaded modules, filesystem paths,
                and server configuration.
                
                This information can assist attackers in identifying vulnerabilities
                or planning targeted attacks.
                
                Remediation
                Remove the phpinfo script from the web root after debugging
