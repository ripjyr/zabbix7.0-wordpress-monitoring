        - uuid: 9c6e9b6e5d7c4e4a9b2f3c5a1d8e6f21
          name: 'Environment file (.env) exposure'
          type: HTTP_AGENT
          key: wordpress.env
          delay: 1d
          value_type: TEXT
          trends: '0'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}.env'
          description: |
            Purpose:
            Detects exposure of a ".env" environment configuration file.
            
            Security Risk:
            The .env file may contain sensitive credentials such as:
            - database username/password
            - API keys
            - application secrets
            - mail server credentials
            
            Exposure of this file can lead to full system compromise.
            
            Remediation:
              Ensure the web server denies access to ".env" files.
              Example for nginx:
            
                location ~ /\.env {
                    deny all;
                }
            
            False Positive:
              Rare. A properly configured server should return 403 or 404.
            
            Reference:
              https://owasp.org/www-project-top-ten/
          triggers:
            - uuid: e4a7b5c1f2d34c1a8b6e9d3f7a1c5e92
