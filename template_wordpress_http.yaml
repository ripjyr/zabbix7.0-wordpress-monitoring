                https://www.php.net/manual/en/function.phpinfo.php
              manual_close: 'YES'
        - uuid: badbfb27cd4643fbb6597c2f8686534f
          name: 'WordPress Install Script'
          type: HTTP_AGENT
          key: wordpress.install.status
          delay: 1d
          description: |
            Purpose
            Detects whether the WordPress installation script (/wp-admin/install.php) is accessible.
            
            This may indicate that the WordPress site is in an uninitialized or re-installable state,
            which can occur after incomplete migrations, database failures, or missing configuration.
            
            Remediation
            Verify that the WordPress database and configuration are properly installed.
            Restrict access to installation scripts and remove them if not required.
            
            False Positive
            Expected only during the initial installation process.
            
            Reference
            https://wordpress.org/documentation/article/installing-wordpress/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-admin/install.php'
          status_codes: ''
          retrieve_mode: HEADERS
          triggers:
            - uuid: af95e013377949d9a0c3cbeece8253df
              expression: last(/Template_WordPress_Security_HTTP/wordpress.install.status)=200
              name: 'WordPress install script exposed'
              url_name: 'View wp-admin/install.php'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-admin/install.php'
              priority: HIGH
              description: |
                Purpose
                Detects whether the WordPress installation script (/wp-admin/install.php) is accessible.
                
                This may indicate that the WordPress site is in an uninitialized or re-installable state,
                which can occur after incomplete migrations, database failures, or missing configuration.
                
                Remediation
                Verify that the WordPress database and configuration are properly installed.
                Restrict access to installation scripts and remove them if not required.
                
                False Positive
