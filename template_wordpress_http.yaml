        - uuid: 4b2e90a7ae98475495b37378bedefc15
          name: 'WordPress Backup "backup" directory listing check'
          type: HTTP_AGENT
          key: wordpress.dirlisting.backup
          delay: 1d
          value_type: TEXT
          trends: '0'
          description: |
            Purpose
            Detects directory listing exposure in the /backup/ directory.
            
            Backup directories are sometimes left in the web root during
            site migrations or manual backup operations.
            
            If directory listing is enabled, attackers may be able to download
            backup archives, database dumps, or old copies of the website.
            
            Remediation
            Remove backup directories from the web root or disable directory listing
            in the web server configuration.
            
            Examples:
            Apache: Options -Indexes
            Nginx: autoindex off
            
            False Positive
            Rare. Backup directories should normally not be publicly accessible.
            
            Reference
            https://owasp.org/www-project-top-ten/
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}backup/'
          status_codes: ''
          triggers:
            - uuid: bb35c443f3be435ca7c09e65aacec364
              expression: 'find(/Template_WordPress_Security_HTTP/wordpress.dirlisting.backup,,"like","Index of")=1 and find(/Template_WordPress_Security_HTTP/wordpress.dirlisting.backup,,"like","Parent Directory")=1'
              name: 'WordPress Backup directory(backup) listing enabled'
              url_name: 'Check backup/ path'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}backup/'
              priority: INFO
              description: |
                Purpose
                Detects directory listing exposure in the /backup/ directory.
                
                Backup directories are sometimes left in the web root during
                site migrations or manual backup operations.
                
                If directory listing is enabled, attackers may be able to download
                backup archives, database dumps, or old copies of the website.
                
                Remediation
                Remove backup directories from the web root or disable directory listing
                in the web server configuration.
                
                Examples:
                Apache: Options -Indexes
                Nginx: autoindex off
                
                False Positive
                Rare. Backup directories should normally not be publicly accessible.
                
                Reference
                https://owasp.org/www-project-top-ten/
              manual_close: 'YES'
        - uuid: e4a8f957578b4eefa22cd27acfe16e76
          name: 'WordPress Backup "old" directory listing check'
          type: HTTP_AGENT
          key: wordpress.dirlisting.old
          delay: 1d
          value_type: TEXT
          trends: '0'
          description: |
            Purpose
            Detects directory listing exposure in the /old/ directory.
            
            The /old/ directory is commonly used during website migrations
            to keep previous versions of the site. If exposed, it may contain
            complete copies of the WordPress installation including
            configuration files, database dumps, or outdated plugins.
            
            Remediation
            Remove old site copies from the web root or restrict access
            to the directory.
            
            False Positive
            Rare. Old site copies should not normally be accessible
            from the internet.
            
            Reference
            https://owasp.org/www-project-top-ten/
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}old/'
          status_codes: ''
          triggers:
            - uuid: 431657826df34cf5bcb74bd469d0c5e1
              expression: 'find(/Template_WordPress_Security_HTTP/wordpress.dirlisting.old,,"like","Index of")=1 and find(/Template_WordPress_Security_HTTP/wordpress.dirlisting.old,,"like","Parent Directory")=1'
              name: 'WordPress Backup directory(old) listing enabled'
              url_name: 'Check old/ path'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}old/'
              priority: INFO
              description: |
                Purpose
                Detects directory listing exposure in the /old/ directory.
                
                The /old/ directory is commonly used during website migrations
                to keep previous versions of the site. If exposed, it may contain
                complete copies of the WordPress installation including
                configuration files, database dumps, or outdated plugins.
                
                Remediation
                Remove old site copies from the web root or restrict access
                to the directory.
                
                False Positive
                Rare. Old site copies should not normally be accessible
                from the internet.
                
                Reference
                https://owasp.org/www-project-top-ten/
              manual_close: 'YES'
        - uuid: e770011216fe4812b99fdda0bdbe283a
