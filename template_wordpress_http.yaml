                Purpose
                Detects directory listing exposure in /wp-content/uploads/.
                
                Remediation
                Disable directory listing in the web server configuration.
                
                Examples:
                Apache: Options -Indexes
                Nginx: autoindex off
                
                False Positive
                Rare. Directory listing is usually unintended.
                
                Reference
                https://owasp.org/www-project-top-ten/
              manual_close: 'YES'
        - uuid: 5a83f31981f84942b0d08bc45910cd4c
          name: 'WordPress Git Exposure'
          type: HTTP_AGENT
          key: wordpress.git.status
          delay: 1d
          description: |
            Purpose
            Detects exposure of a Git repository directory (.git/) within the web root.
            
            Remediation
            Remove the repository from the web root or restrict access via web server configuration.
            
            False Positive
            Rare. Git repositories should never be publicly accessible.
            
            Reference
            https://owasp.org/www-project-top-ten/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
