                Reference:
                  https://owasp.org/www-project-top-ten/
              manual_close: 'YES'
  triggers:
    - uuid: a784c166aaa34cb1b3f2db14df1452f1
      expression: |
        last(/Template_WordPress_Security_HTTP/wordpress.xmlrpc.status)=200
        and
        find(/Template_WordPress_Security_HTTP/wordpress.users.body,,"like","name")=1
      name: 'WordPress attack surface brute-force attack detected (XML-RPC + user enumeration)'
      url_name: 'Check xmlrpc.php'
      url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}xmlrpc.php'
      priority: DISASTER
      description: |
        Purpose
        Detects a potentially dangerous WordPress configuration where both the XML-RPC
        interface and user enumeration via the REST API are publicly accessible.
        
        When these two conditions are present together, attackers may be able to
        identify valid usernames and perform high-speed authentication attempts
        using the XML-RPC multicall functionality.
        
        This combination significantly increases the risk of brute-force attacks
        against WordPress accounts.
        
        Remediation
        Disable XML-RPC if it is not required, or restrict access using web server
        configuration or security plugins.
        
        Restrict the REST API user endpoint (/wp-json/wp/v2/users) or prevent
        unauthenticated access to user information.
        
        False Positive
        Both XML-RPC and REST API user endpoints may be enabled in default WordPress
        installations, but exposing both simultaneously increases attack surface.
        
        Reference
        https://wordpress.org/documentation/article/hardening-wordpress/
        https://developer.wordpress.org/rest-api/reference/users/
        https://wordpress.org/support/article/xml-rpc-support/
    - uuid: 51ec895baeb44ae995c4ae05f3255f8e
      expression: |
        last(/Template_WordPress_Security_HTTP/wordpress.xmlrpc.status)=200
        and
        find(/Template_WordPress_Security_HTTP/wordpress.users.body,,"like","name")=1
        and
        last(/Template_WordPress_Security_HTTP/wordpress.login.status)=200
      name: 'WordPress attack surface brute-force attack detected (XML-RPC + user enumeration + login)'
      url_name: 'Check wp-login.php'
      url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-login.php'
      priority: DISASTER
      description: |
        Purpose
        Detects a high-risk WordPress configuration where the login page,
        XML-RPC interface, and user enumeration via the REST API are all
        publicly accessible.
        
        This combination allows attackers to enumerate valid usernames and
        perform high-speed authentication attempts using XML-RPC multicall
        or direct login attacks.
        
        This significantly increases the likelihood of brute-force attacks
        against WordPress accounts.
        
        Remediation
        Restrict access to the WordPress login page using IP filtering,
        CAPTCHA, or authentication gateways.
        
        Disable XML-RPC if it is not required, or restrict access through
        web server configuration.
        
        Limit or disable REST API user enumeration endpoints
        (/wp-json/wp/v2/users).
        
        False Positive
        Public login pages are common in WordPress installations.
        However, when combined with XML-RPC and user enumeration,
        the attack surface becomes significantly larger.
        
        Reference
        https://wordpress.org/documentation/article/hardening-wordpress/
        https://wordpress.org/support/article/xml-rpc-support/
        https://developer.wordpress.org/rest-api/reference/users/
