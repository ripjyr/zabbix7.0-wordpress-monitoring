zabbix_export:
  version: '7.0'

  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications

  templates:
    - uuid: 5cc06540c01442a8b1074951e15e1d70
      template: Template_WordPress_Security_HTTP
      name: Template WordPress Security HTTP
      description: |
        WordPress Security & Exposure Monitoring Template.
        
        GitHub:
          https://github.com/ripjyr/zabbix7.0-wordpress-monitoring
        
        This template detects common WordPress misconfigurations and
        information leaks using HTTP Agent checks.
        
        Checks include:
        - WordPress admin panel exposure
        - WordPress login page exposure
        - WordPress XML-RPC endpoint
        - WordPress REST API availability
        - WordPress user enumeration via REST API
        - WordPress debug log exposure
        - WordPress config backup exposure
        - git repository exposure
        - WordPress install script exposure
        - WordPress license.txt exposure
        - WordPress version leak via readme.html
        - WordPress version detection via RSS
        - directory listing exposure (wp-content/uploads)
        - WordPress setup config script(setup-config.php) exposure
        - phpinfo page exposure
        - backup directory listing
        - old directory listing
        - environment configuration file exposure (.env)
        
        Compatibility:
          Zabbix 7.0+

      groups:
        - name: Templates/Applications

      macros:
        - macro: '{$WP_ROOT}'
          value: /
          description: "WordPress root path (example: / or /wp/)"

        - macro: '{$WP_PROTO}'
          value: https
          description: 'Protocol used for WordPress monitoring (http or https)'

        - macro: '{$WP_PORT}'
          value: '443'
          description: 'Port used for WordPress monitoring'

      items:
        - uuid: ebf623993f734819aaccc06b3031b604
          name: 'WordPress Admin Panel'
          type: HTTP_AGENT
          key: wordpress.admin.status
          delay: 1d
          description: |
            Purpose
            Detects whether the WordPress administrative interface (/wp-admin/) is publicly reachable.
            
            Remediation
            Restrict access to the admin interface using IP filtering, VPN, or authentication controls.
            
            False Positive
            Public access to /wp-admin/ is common but may increase attack surface.
            
            Reference
            https://wordpress.org/documentation/article/hardening-wordpress/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-admin/'
          status_codes: ''
          retrieve_mode: HEADERS
          triggers:
            - uuid: 5fab7b1a04d741c29b79569734bf5e11
              expression: last(/Template_WordPress_Security_HTTP/wordpress.admin.status)=200
              name: 'WordPress Admin Panel exposed'
              url_name: 'View Admin Panel'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-admin/'
              priority: WARNING
              description: |
                Purpose
                Detects whether the WordPress administrative interface (/wp-admin/) is publicly reachable.
                
                Remediation
                Restrict access to the admin interface using IP filtering, VPN, or authentication controls.
                
                False Positive
                Public access to /wp-admin/ is common but may increase attack surface.
                
                Reference
                https://wordpress.org/documentation/article/hardening-wordpress/
              manual_close: 'YES'
        - uuid: f2aa14bcb3a4471db978e47721599b9e
          name: 'WordPress Admin user'
          type: HTTP_AGENT
          key: wordpress.admin.user
          delay: 1d
          description: |
            Purpose
            Detects potential user enumeration via the author archive redirect mechanism (?author=1).
            
            Remediation
            Disable author enumeration or restrict access using web server rules or security plugins.
            
            False Positive
            Author archives are enabled by default in many WordPress themes.
            
            Reference
            https://wordpress.org/documentation/article/hardening-wordpress/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}?author=1'
          status_codes: ''
          retrieve_mode: HEADERS
        - uuid: 153c1ab7cec64b8c9b84d252ed7e692a
          name: 'WordPress Config Backup'
          type: HTTP_AGENT
          key: wordpress.configbak.status
          delay: 1d
          description: |
            Purpose
            Detects exposed backup copies of the WordPress configuration file (wp-config.php.bak).
            
            Remediation
            Remove backup files or move them outside the web root.
            
            False Positive
            Rare. Configuration backups should not be accessible via HTTP.
            
            Reference
            https://wordpress.org/documentation/article/hardening-wordpress/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-config.php.bak'
          status_codes: ''
          retrieve_mode: HEADERS
          triggers:
            - uuid: 7e6cdc61eb3048e19775ca674db552fe
              expression: last(/Template_WordPress_Security_HTTP/wordpress.configbak.status)=200
              name: 'WordPress config backup exposed'
              url_name: 'View wp-config.php.bak'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-config.php.bak'
              priority: HIGH
              description: |
                Purpose
                Detects exposed backup copies of the WordPress configuration file (wp-config.php.bak).
                
                Remediation
                Remove backup files or move them outside the web root.
                
                False Positive
                Rare. Configuration backups should not be accessible via HTTP.
                
                Reference
                https://wordpress.org/documentation/article/hardening-wordpress/
              manual_close: 'YES'
        - uuid: 931525dc701e409d8dd4c7e6eec73429
          name: 'WordPress Cron'
          type: HTTP_AGENT
          key: wordpress.cron.status
          delay: 1d
          description: |
            Purpose
            Detects whether the WordPress cron endpoint (/wp-cron.php) is accessible.
            
            Remediation
            Consider disabling WP-Cron and replacing it with a system cron job if appropriate.
            
            False Positive
            WP-Cron is normally accessible in default WordPress installations.
            
            Reference
            https://wordpress.org/documentation/article/cron/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
                - \1
              error_handler: CUSTOM_ERROR
              error_handler_params: 'unknown HTTP code need to check url.'
          url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-cron.php'
          status_codes: ''
          retrieve_mode: HEADERS
          triggers:
            - uuid: 8b8523573fc545adb5abfac0d077ac78
              expression: last(/Template_WordPress_Security_HTTP/wordpress.cron.status)=200
              name: 'WordPress cron accessible'
              url_name: 'Check wp-cron.php'
              url: '{$WP_PROTO}://{HOST.HOST}:{$WP_PORT}{$WP_ROOT}wp-cron.php'
              status: DISABLED
              priority: INFO
              description: |
                Purpose
                Detects whether the WordPress cron endpoint (/wp-cron.php) is accessible.
                
                Remediation
                Consider disabling WP-Cron and replacing it with a system cron job if appropriate.
                
                False Positive
                WP-Cron is normally accessible in default WordPress installations.
                
                Reference
                https://wordpress.org/documentation/article/cron/
              manual_close: 'YES'
        - uuid: 467fed38501b4ba69b46543168e6cb35
          name: 'WordPress Debug Log'
          type: HTTP_AGENT
          key: wordpress.debug.status
          delay: 1d
          description: |
            Purpose
            Detects exposure of the WordPress debug log file (/wp-content/debug.log).
            
            Remediation
            Disable debug logging in production or restrict access to the debug log file.
            
            False Positive
            Rare. Debug logs should not be publicly accessible.
            
            Reference
            https://wordpress.org/documentation/article/debugging-in-wordpress/
          preprocessing:
            - type: REGEX
              parameters:
                - '(?s).*HTTP/[0-9\.]+\s([0-9]{3})\b(?!.*HTTP/)'
